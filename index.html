<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="dark:bg-[#060C18] overflow-x-hidden">
    <!-- sidebar -->
    <aside></aside>

    <main class="container">
      <!-- mobile header -->
      <header></header>

      <!-- mobile profile img and date -->
      <div></div>

      <div>
        <h2>تسک های امروز</h2>
        <p>3 تسک را باید انجام دهید.</p>
      </div>

      <!-- add todo button -->
      <div>افزودن وظیفه جدید</div>

      <!-- add todo section -->
      <section>
        <input type="text" />
        <input type="text" />
      </section>

      <!-- uncomplete todos container -->
      <section></section>

      <div>
        <h2>تسک های انجام شده</h2>
        <p>3 تسک انجام شده است.</p>
      </div>

      <!-- complete todos container -->
      <section class="flex flex-col gap-4 min-w-[328px] mx-auto">
        <div class="flex flex-col gap-1">
          <h3
            class="text-[16px] text-[#242424] font-extrabold md:text-[20px] dark:text-[#FFFFFF]"
          >
            تسک‌های انجام شده
          </h3>
          <p
            class="text-[12px] text-[#696969] md:text-[14px] dark:text-[#848890]"
          >
            <span>3</span> تسک را انجام داده‌اید.
          </p>
        </div>
        <div class="flex flex-col gap-4">
          <!-- completed tasks -->

          <div
            class="min-w-94 max-w-[744px] min-h-16 border border-[#E9E9E9] rounded-xl px-4 py-3 flex items-center justify-between dark:bg-[#091120] dark:border-none relative"
          >
            <div
              class="w-1 h-11 md:h-12  bg-[var(--color-primary-yellow)] rounded-l-lg absolute right-0"
            ></div>
            <div class="flex justify-start items-center gap-4 md:gap-3 max-w-[700px]">
              <input
                type="checkbox"
                id="task-check"
                checked
                class="w-5 h-5 rounded-[5px] border border-[#CCCCCC] appearance-none checked:bg-[#007BFF] checked:border-[#007BFF] focus:ring-2 focus:ring-[#007BFF]"
              />
             <div class="max-w-[550px]">
               <label
                for="task-check"
                class="tex-[14px] text-[#323233] font-semibold line-through md:text-[16px] dark:text-white"
              >
                خرید میوه و سبزیجات و لبنیات برای خانه
             </div>
            </div>
             <div class="absolute w-20 h-8 border border-[#EBEDEF] rounded-lg p-1 flex items-center justify-around left-10 top-4 dark:bg-[#0B192D] dark:border-[#293242]">

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6 stroke-[#5C5F61] dark:stroke-[#FFFFFF]">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>


            <div class="border border-[#EBEDEF] h-[20px] dark:border-[#293242]"></div>

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6 stroke-[#5C5F61] dark:stroke-[#FFFFFF]">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
            </svg>



          </div> 
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-7 text-[#525252] dark:text-white cursor-pointer"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                />
              </svg>
            </div>
          </div>

        <div
            class="min-w-94 max-w-[744px] h-16 border border-[#E9E9E9] rounded-xl px-4 py-3 flex items-center justify-between dark:bg-[#091120] dark:border-none relative"
          >
            <div
              class="w-1 h-11 md:h-12  bg-[var(--color-primary-red)] rounded-l-lg absolute right-0"
            ></div>
            <div class="flex justify-start items-center gap-4 md:gap-3">
              <input
                type="checkbox"
                id="task-check"
                checked
                class="w-5 h-5 rounded-[5px] border border-[#CCCCCC] appearance-none checked:bg-[#007BFF] checked:border-[#007BFF] focus:ring-2 focus:ring-[#007BFF]"
              />
              <label
                for="task-check"
                class="tex-[14px] text-[#323233] font-semibold line-through md:text-[16px] dark:text-white"
              >
                خرید میوه و سبزیجات و لبنیات برای خانه
              </label>
            </div>
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-7 text-[#525252] dark:text-white"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                />
              </svg>
            </div>

        </div>

        <div
            class="min-w-94 max-w-[744px] h-16 border border-[#E9E9E9] rounded-xl px-4 py-3 flex items-center justify-between dark:bg-[#091120] dark:border-none relative"
          >
            <div
              class="w-1 h-11 md:h-12  bg-[var(--color-primary-green)] rounded-l-lg absolute right-0"
            ></div>
            <div class="flex justify-start items-center gap-4 md:gap-3">
              <input
                type="checkbox"
                id="task-check"
                checked
                class="w-5 h-5 rounded-[5px] border border-[#CCCCCC] appearance-none checked:bg-[#007BFF] checked:border-[#007BFF] focus:ring-2 focus:ring-[#007BFF]"
              />
              <label
                for="task-check"
                class="tex-[14px] text-[#323233] font-semibold line-through md:text-[16px] dark:text-white"
              >
                خرید میوه و سبزیجات و لبنیات برای خانه
              </label>
            </div>
            <div>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-7 text-[#525252] dark:text-white"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
                />
              </svg>
            </div>

        </div>



      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
